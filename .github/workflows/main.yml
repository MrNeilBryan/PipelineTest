name: Manual Azure SQL Deployment

on:
  workflow_dispatch: # This keeps the "Manual Button" active

jobs:
  deploy-database:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure SQL Deploy
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          # UPDATED PATH: We added /migrations/ before the filename
          path: './migrations/run_all.sql'
          action: 'execute'
