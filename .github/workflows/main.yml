name: Azure SQL Database Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'migrations/**'
  workflow_dispatch: # This allows you to click a "Run" button manually

jobs:
  deploy-database:
    runs-on: windows-latest # We use Windows here as it handles SQL CMD tools very reliably
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }} # See Note Below!

      - name: Execute SQL Scripts
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          # The key change: We point to the FOLDER, but we use a specific 
          # method to ensure it processes them correctly.
          path: './migrations'
          action: 'execute'
