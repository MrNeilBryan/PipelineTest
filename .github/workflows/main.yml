name: Azure SQL Database Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'migrations/**'
  workflow_dispatch: 

jobs:
  deploy-database:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute SQL Scripts
        uses: azure/sql-action@v2
        with:
          # This uses your secret to log in directly
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          
          # This tells the tool to look at the whole folder
          path: './migrations'
          
          # This tells it to run them one-by-one
          action: 'execute'
