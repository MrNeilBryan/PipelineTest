name: Azure SQL Deploy

on:
  push:
    branches: [ "main" ]  # Runs when you save to main
    paths:
      - 'migrations/**'    # Only runs if you add/change files in the migrations folder

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure SQL Deploy
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: './migrations/001-Create_Table.sql.sql'
          action: 'execute'
