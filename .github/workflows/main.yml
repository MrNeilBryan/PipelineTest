name: Azure SQL Database Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'migrations/**'
  workflow_dispatch: 

jobs:
  deploy-database:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run all SQL scripts in order
        shell: pwsh
        run: |
          # 1. Find all .sql files in the migrations folder
          $files = Get-ChildItem -Path ./migrations/*.sql | Sort-Object Name
          
          # 2. Loop through each file and run it
          foreach ($file in $files) {
              Write-Host "--- Executing: $($file.Name) ---"
              
              # This calls the SQL action specifically for THIS file
              uses: azure/sql-action@v2
              with:
                connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
                path: $($file.FullName)
                action: 'execute'
          }
