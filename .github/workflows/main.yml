name: Azure SQL Database Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'migrations/**'
      - 'run_all.sql' # Also watch the boss file for changes
  workflow_dispatch: 

jobs:
  deploy-database:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure SQL Deploy
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          # Pointing to exactly ONE file solves the error!
          path: './run_all.sql'
          action: 'execute'
